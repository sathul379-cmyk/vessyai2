<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vessy OS — Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#0a0a0e;color:#e8e8e8;min-height:100vh;display:flex;flex-direction:column;align-items:center}
        ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:10px}

        .admin-login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%;padding:20px}
        .admin-login{width:100%;max-width:400px;background:#111114;border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:40px 30px;text-align:center;box-shadow:0 25px 80px rgba(0,0,0,.8)}
        .admin-login h1{font-size:20px;margin-bottom:6px;background:linear-gradient(135deg,#ff0055,#ff4488);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .admin-login p{font-size:12px;color:#666;margin-bottom:24px}
        .admin-login .icon{width:56px;height:56px;margin:0 auto 18px;background:rgba(255,0,85,.1);border:1px solid rgba(255,0,85,.2);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:22px;color:#ff0055}
        .admin-input{width:100%;background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 14px;color:white;font-size:14px;outline:none;font-family:inherit;margin-bottom:12px}
        .admin-input:focus{border-color:rgba(255,0,85,.4)}
        .admin-input::placeholder{color:rgba(255,255,255,.18)}
        .admin-submit{width:100%;padding:13px;background:linear-gradient(135deg,#ff0055,#cc0044);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.3s}
        .admin-submit:hover{box-shadow:0 6px 25px rgba(255,0,85,.3)}
        .admin-submit.loading{opacity:.5;pointer-events:none}
        .admin-error{font-size:12px;color:#ff0055;min-height:20px;margin-bottom:8px}

        .admin-panel{width:100%;max-width:1000px;padding:20px;display:none}
        .admin-panel.show{display:block}
        .admin-topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,.08);flex-wrap:wrap;gap:10px}
        .admin-topbar h1{font-size:18px;display:flex;align-items:center;gap:10px}.admin-topbar h1 i{color:#ff0055}
        .admin-topbar .ver{font-size:10px;color:#555;background:rgba(255,255,255,.04);padding:3px 8px;border-radius:4px}

        .admin-stats{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
        .stat-card{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);padding:18px 22px;border-radius:12px;flex:1;min-width:120px;text-align:center}
        .stat-card .num{font-size:32px;font-weight:800;color:#00f2ff;display:block}
        .stat-card .lbl{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-top:4px;display:block}

        .admin-actions{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
        .dl-btn{padding:10px 20px;background:linear-gradient(135deg,#ff0055,#cc0044);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:.2s}
        .dl-btn:hover{box-shadow:0 4px 15px rgba(255,0,85,.3);transform:translateY(-1px)}
        .dl-btn.sec{background:rgba(255,255,255,.04);color:#888;border:1px solid rgba(255,255,255,.08)}
        .dl-btn.sec:hover{color:#fff}

        .user-card{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:12px;margin-bottom:8px;overflow:hidden}
        .user-card-head{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:.2s}
        .user-card-head:hover{background:rgba(255,255,255,.03)}
        .uname{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}.uname i{color:#00f2ff;font-size:8px}
        .umeta{font-size:10px;color:#555;font-family:monospace}
        .uchats{padding:16px 18px;border-top:1px solid rgba(255,255,255,.04);display:none;max-height:400px;overflow-y:auto}
        .uchats.open{display:block}
        .ce{padding:8px 0;border-bottom:1px solid rgba(255,255,255,.02)}.ce:last-child{border:none}
        .cr{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
        .cr.u{color:#ff00ff}.cr.a{color:#00f2ff}
        .cc{font-size:12px;color:#999;line-height:1.5;word-break:break-word}
        .ct{font-size:9px;color:#333;font-family:monospace;margin-top:2px}

        .admin-foot{text-align:center;padding:30px 0;font-size:10px;color:rgba(255,255,255,.1)}
        .ld{text-align:center;padding:40px;color:#555}
        .spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,.1);border-top-color:#ff0055;border-radius:50%;animation:spin .6s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* BAN UI ELEMENTS */
        .ban-actions{display:flex;gap:6px;margin-left:8px;flex-wrap:nowrap}
        .ban-btn{padding:6px 10px;border:none;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;white-space:nowrap}
        .ban-btn:hover{transform:translateY(-1px)}
        .ban-btn.temp{background:rgba(255,170,0,.12);color:#ffaa00}.ban-btn.temp:hover{background:rgba(255,170,0,.22)}
        .ban-btn.perma{background:rgba(255,0,85,.12);color:#ff0055}.ban-btn.perma:hover{background:rgba(255,0,85,.22)}
        .ban-btn.unban{background:rgba(0,255,136,.1);color:#00ff88}.unban:hover{background:rgba(0,255,136,.18)}
        .banned-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:5px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
        .banned-badge.t{background:rgba(255,170,0,.08);color:#ffaa00}.banned-badge.t::before{content:'⏳'}
        .banned-badge.p{background:rgba(255,0,85,.08);color:#ff0055}.banned-badge.p::before{content:'🚫'}
        .ip-card{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
        .ip-info{font-family:monospace;font-size:13px;color:#ffaa00;display:flex;align-items:center;gap:8px}
        .ip-meta{font-size:9px;color:#444}.ip-meta .type{color:#ff0055;font-weight:700}
        .ip-meta .type.temp{color:#ffaa00}
        .ip-badge{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700;background:rgba(255,170,0,.08);color:#ffaa00}
        .ip-badge.perm{background:rgba(255,0,85,.08);color:#ff0055}
        .ban-modal{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);animation:fadeIn .2s}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .ban-modal-content{width:90%;max-width:380px;background:#111114;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:28px 24px;box-shadow:0 25px 80px rgba(0,0,0,.8)}
        .ban-modal h2{font-size:16px;margin-bottom:4px}.ban-modal .subtitle{font-size:11px;color:#555;margin-bottom:20px}
        .ban-modal select,.ban-modal input{width:100%;background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.08);border-radius:8px;padding:10px 12px;color:white;font-size:13px;outline:none;font-family:inherit;margin-bottom:12px}
        .ban-modal select:focus,.ban-modal input:focus{border-color:rgba(255,0,85,.4)}
        .ban-modal select option{background:#1a1a1e;color:white}
        .ban-modal-row{display:flex;gap:6px;margin-bottom:0}
        .ban-modal-row .btn{flex:1;padding:10px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
        .ban-modal-row .btn.exec{background:linear-gradient(135deg,#ff0055,#cc0044);color:white}
        .ban-modal-row .btn.cancel{background:rgba(255,255,255,.04);color:#666}
        .ban-modal-row .btn.cancel:hover{color:#fff}

        @media(max-width:600px){.admin-stats{flex-direction:column}.admin-panel{padding:12px}.ban-actions{flex-wrap:wrap}}
    </style>
</head>
<body>
    <div class="admin-login-wrap" id="lw">
        <div class="admin-login">
            <div class="icon"><i class="fa-solid fa-user-shield"></i></div>
            <h1>Admin Panel</h1>
            <p>Vessy OS 31.1 — Authorized Access Only</p>
            <input type="password" class="admin-input" id="apw" placeholder="Enter admin password" autocomplete="off">
            <div class="admin-error" id="aerr"></div>
            <button class="admin-submit" id="abtn" onclick="doLogin()">Authenticate</button>
        </div>
    </div>

    <div class="admin-panel" id="ap">
        <div class="admin-topbar">
            <h1><i class="fa-solid fa-user-shield"></i> Vessy OS Admin <span class="ver">v31.1</span></h1>
            <button class="dl-btn sec" onclick="location.href='/'"><i class="fa-solid fa-arrow-left"></i> Back</button>
        </div>
        <div class="admin-stats" id="as"></div>
        <div class="admin-actions" id="aa"></div>
        <div id="ul"></div>
        <div class="admin-foot">© 2026 Vessy OS. All Rights Reserved.</div>
    </div>

    <script>
    document.getElementById('apw').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeBanModal(); });

    let allUsers = [], allChats = {}, userBans = [], bannedIps = [];
    let adminPw = '', banTarget = '', banMode = '';

    async function doLogin() {
        const pw = document.getElementById('apw').value;
        const err = document.getElementById('aerr');
        const btn = document.getElementById('abtn');
        err.textContent = '';

        if (!pw) { err.textContent = 'Enter password.'; return; }

        btn.classList.add('loading');
        btn.textContent = 'Authenticating...';

        try {
            const r = await fetch('/api/admin-data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ adminPassword: pw })
            });
            const d = await r.json();

            if (d.error) {
                err.textContent = d.error;
                btn.classList.remove('loading');
                btn.textContent = 'Authenticate';
                return;
            }

            // Success
            adminPw = pw;
            document.getElementById('lw').style.display = 'none';
            document.getElementById('ap').classList.add('show');

            allUsers = d.users || [];
            allChats = d.chats || {};
            userBans = d.userBans || [];
            bannedIps = d.bannedIps || [];
            renderPanel();

        } catch(e) {
            err.textContent = 'Connection failed: ' + e.message;
            btn.classList.remove('loading');
            btn.textContent = 'Authenticate';
        }
    }

    function renderPanel() {
        let totalMsgs = 0;
        Object.values(allChats).forEach(c => totalMsgs += (c||[]).length);

        document.getElementById('ul').innerHTML = `
            <div class="admin-stats">
                <div class="stat-card"><span class="num">${allUsers.length}</span><span class="lbl">Users</span></div>
                <div class="stat-card"><span class="num">${totalMsgs}</span><span class="lbl">Messages</span></div>
                <div class="stat-card"><span class="num">${Object.keys(allChats).filter(k=>(allChats[k]||[]).length>0).length}</span><span class="lbl">Active Logs</span></div>
                <div class="stat-card"><span class="num">${userBans.length + bannedIps.length}</span><span class="lbl">Bans Active</span></div>
            </div>
        `;

        document.getElementById('aa').innerHTML = `
            <button class="dl-btn" onclick="dlTXT()"><i class="fa-solid fa-download"></i> Download All (TXT)</button>
            <button class="dl-btn sec" onclick="dlJSON()"><i class="fa-solid fa-code"></i> Download All (JSON)</button>
        `;

        let html = '';

        // IP BANS SECTION
        if (bannedIps.length > 0) {
            html += `<div style="margin-bottom:16px"><h3 style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px">
                <i class="fa-solid fa-globe"></i> Banned IPs (${bannedIps.length})</h3>`;
            bannedIps.forEach(b => {
                const isPerma = !b.expiresAt;
                const timeLeft = isPerma ? 'permanent' : Math.ceil((new Date(b.expiresAt) - Date.now()) / 60000) + ' min left';
                const badgeClass = isPerma ? 'perm' : 'temp';
                const badgeText = isPerma ? 'PERMA' : timeLeft;
                html += `<div class="ip-card">
                    <div>
                        <div class="ip-info"><i class="fa-solid fa-earth-americas"></i> ${esc(b.ip)}
                            <span class="ip-badge ${badgeClass}">${badgeText}</span>
                        </div>
                        <div class="ip-meta">Since ${new Date(b.createdAt).toLocaleString()}</div>
                    </div>
                    <div style="display:flex;gap:6px;align-items:center">
                        <button class="dl-btn sec" style="padding:6px 10px;font-size:12px" onclick="copyIp('${esc(b.ip)}')" title="Copy IP"><i class="fa-solid fa-copy"></i></button>
                        <button class="dl-btn" style="padding:6px 10px;font-size:10px;background:rgba(0,255,136,.1);color:#00ff88;border:none;border-radius:6px;font-weight:700;cursor:pointer;font-family:inherit" onclick="doUnbanIp('${esc(b.ip)}')">Unban <i class="fa-solid fa-check"></i></button>
                    </div>
                </div>`;
            });
            html += '</div>';
        }

        // USERS SECTION
        html += `<div style="margin-bottom:8px"><h3 style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px">
            <i class="fa-solid fa-users"></i> Users</h3></div>`;

        const banMap = {};
        userBans.forEach(b => { banMap[b.username] = b; });

        allUsers.forEach(u => {
            const uc = allChats[u] || [];
            const isBanned = banMap.hasOwnProperty(u);
            const banInfo = banMap[u];
            const badgeHtml = isBanned
                ? `<span class="banned-badge ${banInfo.type === 'temp' ? 't' : 'p'}">${banInfo.type === 'temp' ? (banInfo.expiresAt ? Math.ceil((new Date(banInfo.expiresAt) - Date.now()) / 60000) + 'm' : '') : 'PERMA'}</span>`
                : '';

            html += `<div class="user-card" style="${isBanned ? 'border-color:rgba(255,0,85,.15)' : ''}">
                <div class="user-card-head" onclick="this.nextElementSibling.classList.toggle('open')">
                    <div class="uname"><i class="fa-solid fa-circle"></i> ${esc(u)} ${badgeHtml}</div>
                    <div style="display:flex;align-items:center;gap:10px">
                        <div class="umeta">${uc.length} msgs</div>
                        <div class="ban-actions">`;

            if (!isBanned) {
                html += `<button class="ban-btn temp" onclick="event.stopPropagation();openBanModal('${esc(u)}','temp')"><i class="fa-solid fa-clock"></i> Temp Ban</button>
                         <button class="ban-btn perma" onclick="event.stopPropagation();openBanModal('${esc(u)}','perma')"><i class="fa-solid fa-ban"></i> Perma Ban</button>`;
            } else {
                html += `<button class="ban-btn unban" onclick="event.stopPropagation();doUnbanUser('${esc(u)}')"><i class="fa-solid fa-check"></i> Unban</button>`;
            }

            html += `</div></div></div>
                <div class="uchats">`;

            if (uc.length === 0) {
                html += '<div style="color:#444;font-size:11px;padding:8px 0;">No messages yet.</div>';
            } else {
                uc.forEach(m => {
                    const who = m.role === 'user' ? u : 'Vessy OS';
                    const rc = m.role === 'user' ? 'u' : 'a';
                    const time = m.timestamp ? new Date(m.timestamp).toLocaleString() : '';
                    html += `<div class="ce">
                        <div class="cr ${rc}">${esc(who)}</div>
                        <div class="cc">${esc((m.content||'').substring(0,1000))}</div>
                        <div class="ct">${time}</div>
                    </div>`;
                });
            }
            html += '</div></div>';
        });

        if (allUsers.length === 0) {
            html += '<div class="ld">No users registered yet.</div>';
        }

        document.getElementById('ul').innerHTML = html;
    }

    function dlTXT() {
        let totalMsgs = 0;
        Object.values(allChats).forEach(c => totalMsgs += (c||[]).length);

        let txt = '';
        txt += '='.repeat(50) + '\n';
        txt += 'VESSY OS 31.1 — ALL USER CHAT LOGS\n';
        txt += 'Downloaded: ' + new Date().toLocaleString() + '\n';
        txt += 'Total Users: ' + allUsers.length + '\n';
        txt += 'Total Messages: ' + totalMsgs + '\n';
        txt += '='.repeat(50) + '\n\n';

        allUsers.forEach(u => {
            const uc = allChats[u] || [];
            if (!uc.length) return;

            txt += '\n' + '-'.repeat(40) + '\n';
            txt += 'USER: ' + u + ' (' + uc.length + ' messages)\n';
            txt += '-'.repeat(40) + '\n\n';

            uc.forEach(m => {
                const who = m.role === 'user' ? u : 'Vessy OS';
                const time = m.timestamp ? '[' + new Date(m.timestamp).toLocaleString() + '] ' : '';
                txt += time + who + ':\n' + m.content + '\n\n';
            });
        });

        txt += '\n' + '='.repeat(50) + '\n';
        txt += '© 2026 Vessy OS. All Rights Reserved.\n';
        txt += '='.repeat(50) + '\n';

        download(txt, 'vessy-os-all-chats-' + today() + '.txt', 'text/plain');
    }

    function dlJSON() {
        let totalMsgs = 0;
        Object.values(allChats).forEach(c => totalMsgs += (c||[]).length);

        const data = {
            version: '31.1',
            exported: new Date().toISOString(),
            totalUsers: allUsers.length,
            totalMessages: totalMsgs,
            users: {}
        };
        allUsers.forEach(u => { data.users[u] = allChats[u] || []; });
        download(JSON.stringify(data, null, 2), 'vessy-os-chats-' + today() + '.json', 'application/json');
    }

    function download(content, filename, type) {
        const blob = new Blob([content], { type });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(a.href);
    }

    function today() { return new Date().toISOString().slice(0, 10); }
    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // BAN MODAL
    function openBanModal(user, mode) {
        banTarget = user;
        banMode = mode;
        let existing = document.getElementById('banModal');
        if (existing) existing.remove();

        const durOptions = mode === 'perma'
            ? `<option value="0" selected>Permanent Ban</option>`
            : `<option value="30">30 min</option><option value="120" selected>2 hours</option><option value="480">8 hours</option><option value="1440">24 hours</option><option value="10080">7 days</option><option value="43200">30 days</option>`;

        const div = document.createElement('div');
        div.className = 'ban-modal';
        div.id = 'banModal';
        div.innerHTML = `<div class="ban-modal-content">
            <h2><i class="fa-solid fa-gavel" style="color:#ff0055"></i> Ban User</h2>
            <div class="subtitle">Action: <strong>${mode === 'temp' ? '🟡 Temporary Ban' : '🔴 Permanent Ban'}</strong> — Target: <strong>${esc(user)}</strong></div>
            ${mode === 'temp' ? `<select id="banDur"><label>Duration:</label>${durOptions}</select>` : `<input type="hidden" id="banDur" value="0">`}}
            <div style="margin-bottom:16px">
                <label style="display:flex;align-items:center;gap:8px;font-size:11px;color:#888;cursor:pointer">
                    <input type="checkbox" id="ipBanToggle" style="margin:0;width:14px;height:14px;accent-color:#ff0055"> Also ban their IP
                </label>
            </div>
            <div class="ban-modal-row">
                <button class="btn cancel" onclick="closeBanModal()">Cancel</button>
                <button class="btn exec" onclick="execBan()">${mode === 'temp' ? 'Temp Ban' : 'Permanent Ban'}</button>
            </div>
        </div>`;
        document.body.appendChild(div);
        div.addEventListener('click', e => { if (e.target === div) closeBanModal(); });
    }

    function closeBanModal() {
        const el = document.getElementById('banModal');
        if (el) el.remove();
        banTarget = ''; banMode = '';
    }

    async function execBan() {
        const user = banTarget;
        const mode = banMode;
        const dur = parseInt(document.getElementById('banDur').value) || 0;
        const alsoIp = document.getElementById('ipBanToggle').checked;
        const btn = document.querySelector('#banModal .btn.exec');

        btn.disabled = true;
        btn.textContent = 'Banning...';

        try {
            const r = await fetch('/api/ban-user', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    adminPassword: adminPw,
                    action: 'ban-user',
                    username: user,
                    banType: mode === 'temp' ? 'temp' : 'perma',
                    durationMinutes: dur
                })
            });
            const d = await r.json();
            if (d.error) { alert(d.error); return; }

            // Also ban IP?
            if (alsoIp) {
                const ipRes = await fetch('https://api.ipify.org?format=json').catch(() => null);
                if (ipRes) {
                    const ipData = await ipRes.json();
                    // Ban user's IP — we need to get it from session data or use the current client approach
                    alert('Note: IP is logged server-side. Use client fetch for ban.');
                }
            }

            closeBanModal();
            alert(d.message || 'Done!');
            // Refresh data
            const r2 = await fetch('/api/admin-data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({adminPassword: adminPw}) });
            const d2 = await r2.json();
            allChats = d2.chats || {};
            userBans = d2.userBans || [];
            bannedIps = d2.bannedIps || [];
            renderPanel();
        } catch(e) {
            alert('Failed: ' + e.message);
            btn.disabled = false;
            btn.textContent = banMode === 'temp' ? 'Temp Ban' : 'Permanent Ban';
        }
    }

    async function doUnbanUser(user) {
        if (!confirm(`Unban "${user}"?`)) return;
        try {
            const r = await fetch('/api/ban-user', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ adminPassword: adminPw, action: 'unban-user', username: user })
            });
            const d = await r.json();
            alert(d.error || d.message);
            const r2 = await fetch('/api/admin-data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({adminPassword: adminPw}) });
            const d2 = await r2.json();
            userBans = d2.userBans || [];
            bannedIps = d2.bannedIps || [];
            renderPanel();
        } catch(e) { alert('Failed: ' + e.message); }
    }

    async function doUnbanIp(ip) {
        if (!confirm(`Unban IP "${ip}"?`)) return;
        try {
            const r = await fetch('/api/ban-user', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ adminPassword: adminPw, action: 'unban-ip', ip })
            });
            const d = await r.json();
            alert(d.error || d.message);
            const r2 = await fetch('/api/admin-data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({adminPassword: adminPw}) });
            const d2 = await r2.json();
            bannedIps = d2.bannedIps || [];
            renderPanel();
        } catch(e) { alert('Failed: ' + e.message); }
    }

    function copyIp(ip) {
        navigator.clipboard.writeText(ip).then(() => {
            alert('IP copied: ' + ip);
        });
    }
    </script>
